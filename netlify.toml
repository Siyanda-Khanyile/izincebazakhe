# ─────────────────────────────────────────────────────────────
# Netlify Build Configuration — Izinceba Zakhe Website
# ─────────────────────────────────────────────────────────────
[build]
  command = "node generate-manifest.js"
  publish = "."

[functions]
  directory      = "netlify/functions"
  node_bundler   = "esbuild"

# Redirect HTTP → HTTPS
[[redirects]]
  from   = "http://izincebazakhe.com/*"
  to     = "https://izincebazakhe.com/:splat"
  status = 301
  force  = true

[[redirects]]
  from   = "http://www.izincebazakhe.com/*"
  to     = "https://izincebazakhe.com/:splat"
  status = 301
  force  = true
